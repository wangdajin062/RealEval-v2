# RunPod Single-Card H100 SXM 80GB · 8 vCPU · 125GB RAM · PyTorch 2.8 Override Profile
# Usage: Use REALEVAL_ environment variables or merge in runner; key is to tune scale for single 80GB card stability.
profile: runpod_1xH100_80GB
hardware:
  gpus: 1
  vram_gb: 80
  vcpu: 8
  ram_gb: 125
runtime:
  bf16: true
  tf32: true
  torch_compile: true
  flash_attention: true
  quantization: int4          # 0.5B can actually run BF16 full precision; INT4 used to align with paper quantization path
  omp_threads: 8              # = vCPU, single card no sharing
paper_run:
  distill_steps: 2000
  eval_samples: 2851          # TAF-28k BC test set
  spec_samples: 500
  latency_iters: 100
  batch_size: 64              # 0.5B@BF16 on 80GB can go larger; conservative 64 for stability
data:
  source: taf28k             # Force real; errors out if missing
  root_hint: /workspace/data # RunPod persistent volume
models:
  root_hint: /workspace/models
